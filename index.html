<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3dd68c">
<title>MLOA — 로스트아크 통합 포털</title>
<style>
:root{--bg:#111113;--bg2:#18181c;--bg3:#1f1f25;--bg4:#27272f;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--text:#ededf0;--text2:#8888a0;--text3:#55556a;--green:#3dd68c;--green2:#16a34a;--gbg:rgba(61,214,140,0.08);--gborder:rgba(61,214,140,0.18);--gold:#f5c542;--abg:rgba(245,197,66,0.08);--aborder:rgba(245,197,66,0.2);--blue:#5b9cf6;--bbg:rgba(91,156,246,0.08);--bborder:rgba(91,156,246,0.2);--red:#f06a6a;--rbg:rgba(240,106,106,0.08);--purple:#b57cf0;--pbg:rgba(181,124,240,0.08);--r:8px;--rl:12px;--rs:5px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;min-height:100vh}
.hd{padding:40px 20px 0;display:flex;flex-direction:column;align-items:center;gap:16px}
.logo{font-size:32px;font-weight:900;letter-spacing:2px}.logo em{color:var(--green);font-style:normal}
.sf{width:100%;max-width:460px;display:flex;gap:6px}
.sf input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;color:var(--text);font-size:14px;outline:none}
.sf input:focus{border-color:var(--green)}.sf input::placeholder{color:var(--text3)}
.sf button{background:var(--green2);color:#fff;border:none;border-radius:var(--r);padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.site-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;max-width:900px;width:100%;margin:0 auto;padding:30px 20px 20px}
.sc{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .15s}.sc:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px)}
.sc-head{padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.sc-name{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px}.sc-arr{font-size:10px;color:var(--text3)}
.sc-tags{padding:0 12px 10px;display:flex;flex-wrap:wrap;gap:3px}
.stag{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--bg4);color:var(--text2)}
.stag-g{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}.stag-b{background:var(--bbg);color:var(--blue)}.stag-a{background:var(--abg);color:var(--gold)}.stag-p{background:var(--pbg);color:var(--purple)}
.install-wrap{max-width:900px;width:100%;margin:0 auto;padding:0 20px 40px;text-align:center}
.install-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}.install-btn:hover{border-color:var(--green);color:var(--green);background:var(--gbg)}.install-hide{display:none}
.result-wrap{max-width:900px;width:100%;margin:0 auto;padding:0 20px 40px}
.back-btn{font-size:12px;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:12px;margin-top:16px;padding:4px 0}.back-btn:hover{color:var(--green)}
.char-banner{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden;margin-bottom:16px}
.char-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--blue))}
.char-img{width:56px;height:56px;border-radius:50%;background:var(--gbg);border:2px solid var(--gborder);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--green);flex-shrink:0}
.char-main{flex:1}.char-name{font-size:20px;font-weight:800;letter-spacing:-.5px}.char-class{font-size:13px;color:var(--text2);margin-top:3px}
.char-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-g{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}.badge-b{background:var(--bbg);color:var(--blue);border:1px solid var(--bborder)}.badge-gray{background:var(--bg4);color:var(--text2)}
.char-links{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.cl{font-size:11px;padding:6px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text2);cursor:pointer;white-space:nowrap;text-decoration:none;transition:all .12s}.cl:hover{border-color:var(--green);color:var(--green)}.cl.primary{background:var(--green2);border-color:var(--green2);color:#fff}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:16px}
.sec-title{font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:12px;background:var(--green);border-radius:2px;display:inline-block}
.sec-link{font-size:11px;color:var(--text3);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);transition:all .12s}.sec-link:hover{border-color:var(--gborder);color:var(--green);background:var(--gbg)}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 15px}
.panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.panel-title{font-size:12px;font-weight:700;color:var(--text)}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}.row:last-of-type{border-bottom:none}
.rl{color:var(--text2)}.rv{font-weight:600}.rv-g{color:var(--green);font-weight:700}.rv-a{color:var(--gold);font-weight:700}.rv-r{color:var(--red)}.rv-b{color:var(--blue)}
.engr-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.engr-item{background:var(--bg3);border-radius:var(--rs);padding:5px 9px;display:flex;justify-content:space-between;font-size:12px;border:1px solid var(--border)}.engr-lv{color:var(--green);font-weight:700}
.gem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:7px;margin-bottom:10px}
.gem-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 9px;min-height:70px;display:flex;flex-direction:column;justify-content:center;gap:3px}
.gem-box.lv10{border-color:rgba(245,197,66,.4);background:rgba(245,197,66,.06)}.gem-box.lv9{border-color:var(--gborder);background:var(--gbg)}.gem-box.lv8{border-color:rgba(91,156,246,.3);background:rgba(91,156,246,.05)}
.gem-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.gem-lv{font-size:15px;font-weight:800;line-height:1}.gem-box.lv10 .gem-lv{color:var(--gold)}.gem-box.lv9 .gem-lv{color:var(--green)}.gem-box.lv8 .gem-lv{color:var(--blue)}
.gem-type{font-size:10px;color:var(--text2);font-weight:700;white-space:nowrap}
.gem-skill{font-size:11px;color:var(--text);font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}.bar-lbl{font-size:11px;color:var(--text2);width:46px;flex-shrink:0}.bar-track{flex:1;height:4px;background:var(--bg4);border-radius:2px}.bar-fill{height:4px;border-radius:2px}.bar-val{font-size:11px;font-weight:600;width:22px;text-align:right;flex-shrink:0}
.ark-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}.ark-type{font-size:11px;color:var(--text2);width:36px;flex-shrink:0;font-weight:600}
.ark-cores{display:flex;gap:4px;flex:1}
.ark-core{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:6px 8px;text-align:center;flex:1}.ark-core .core-pt{font-size:13px;font-weight:700;color:var(--text)}.ark-core .core-lbl{font-size:9px;color:var(--text3);margin-top:1px}
.ark-core.high{border-color:var(--gborder);background:var(--gbg)}.ark-core.high .core-pt{color:var(--green)}
.ark-core.mid{border-color:var(--aborder);background:var(--abg)}.ark-core.mid .core-pt{color:var(--gold)}
.ark-pts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:var(--text2)}.ark-pts strong{color:var(--text)}.ark-pts .dot{color:var(--text3)}
.more-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.more-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);cursor:pointer;text-decoration:none;color:inherit;transition:all .12s}.more-btn:hover{border-color:var(--gborder);background:var(--gbg)}.more-btn:hover .mb-title{color:var(--green)}
.mb-title{font-size:12px;font-weight:600;color:var(--text2)}.mb-arr{font-size:11px;color:var(--text3)}
.status{border-radius:var(--r);padding:9px 13px;font-size:12px;display:flex;align-items:center;gap:7px;margin-bottom:12px}
.status.loading{background:var(--abg);border:1px solid var(--aborder);color:var(--gold)}
.status.err{background:var(--rbg);border:1px solid rgba(240,106,106,.2);color:var(--red)}
.acc-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;margin-bottom:5px}
.acc-top{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.acc-stat{font-size:11px;color:var(--text2);margin-bottom:2px}
.acc-eff{font-size:11px;color:var(--blue);padding:2px 0}
.brac-eff{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}.brac-eff:last-child{border-bottom:none}
.brac-name{color:var(--text2)}.brac-val{font-weight:600}
 .brac-desc{font-size:11px;color:var(--text3);padding:3px 0;line-height:1.4}
.brac-section-label{font-size:11px;color:var(--text2);font-weight:700;margin-top:10px;margin-bottom:6px;padding-top:8px;border-top:1px solid var(--border)}
.brac-list{display:flex;flex-direction:column;gap:6px}
.brac-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px}
.brac-card-desc{font-size:11px;color:var(--text);line-height:1.55;word-break:keep-all}
.brac-card-desc strong{color:var(--blue);font-style:normal;font-weight:800}.brac-card-desc em{color:var(--green);font-style:normal;font-weight:800}.brac-card-desc b{color:var(--purple);font-style:normal;font-weight:800}
.brac-empty{font-size:11px;color:var(--text3);padding:7px 0}

.ark-core-wrap{display:flex;flex-direction:column;gap:8px}
.ark-core-row{display:grid;grid-template-columns:42px repeat(3,minmax(0,1fr));gap:6px;align-items:center}
.ark-core-label{font-size:12px;color:var(--text2);font-weight:700;text-align:left}
.ark-core-box{min-height:58px;border:1px solid var(--border2);border-radius:var(--r);background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 5px;box-shadow:inset 0 0 18px rgba(255,255,255,.015)}
.ark-core-box .ark-core-pt{font-size:16px;font-weight:900;line-height:1;letter-spacing:-.2px}
.ark-core-box .ark-core-name{font-size:10px;color:var(--text3);margin-top:4px;font-weight:600}
.ark-core-box.legendary{border-color:rgba(245,197,66,.72);background:rgba(245,197,66,.08);box-shadow:0 0 12px rgba(245,197,66,.10),inset 0 0 18px rgba(245,197,66,.035)}
.ark-core-box.legendary .ark-core-pt{color:var(--gold)}
.ark-core-box.relic{border-color:rgba(255,138,35,.72);background:rgba(255,138,35,.08);box-shadow:0 0 12px rgba(255,138,35,.10),inset 0 0 18px rgba(255,138,35,.035)}
.ark-core-box.relic .ark-core-pt{color:#ff9d3b}
.ark-core-box.ancient{border-color:rgba(255,255,255,.62);background:rgba(255,255,255,.045);box-shadow:0 0 12px rgba(255,255,255,.08),inset 0 0 18px rgba(255,255,255,.025)}
.ark-core-box.ancient .ark-core-pt{color:#f4f4f7}
.ark-core-box.unknown{border-color:var(--border2);background:var(--bg3)}
.ark-core-box.unknown .ark-core-pt{color:var(--text2)}
.ark-core-note{font-size:11px;color:var(--text3);line-height:1.45;margin-top:8px}
@media(max-width:720px){.site-grid{grid-template-columns:repeat(2,1fr)}.g2,.more-grid{grid-template-columns:1fr}.char-banner{flex-direction:column;text-align:center}.char-links{justify-content:center}}


/* ===== 가독성 확대 버전 =====
   전체 화면 폭과 글씨 크기를 키운다. 기존 기능/JS는 건드리지 않음. */
body{font-size:15px;line-height:1.45}
.hd{padding:48px 24px 0;gap:20px}
.logo{font-size:38px}
.sf{max-width:560px;gap:8px}
.sf input{font-size:16px;padding:13px 16px}
.sf button{font-size:16px;padding:13px 28px}
.site-grid{max-width:1120px;gap:12px;padding:36px 24px 24px}
.sc-head{padding:13px 15px}.sc-name{font-size:14px}.sc-arr{font-size:12px}.sc-tags{padding:0 15px 13px;gap:5px}.stag{font-size:12px;padding:3px 8px}
.install-wrap{max-width:1120px;padding:0 24px 48px}.install-btn{font-size:15px;padding:14px 32px}
.result-wrap{max-width:1120px;padding:0 24px 52px}
#resultScreen>div:first-child{height:60px!important;padding:0 24px!important;gap:18px!important}
#resultScreen>div:first-child .logo{font-size:20px!important}
#resultScreen>div:first-child .sf{max-width:480px!important}
.back-btn{font-size:14px;margin-bottom:16px;margin-top:20px;padding:6px 0}
.char-banner{padding:24px;gap:22px;margin-bottom:20px;border-radius:14px}
.char-img{width:66px;height:66px;font-size:26px}.char-name{font-size:25px}.char-class{font-size:15px;margin-top:4px}.char-badges{gap:8px;margin-top:10px}.badge{font-size:13px;padding:5px 12px}.char-links{gap:7px}.cl{font-size:13px;padding:8px 14px}
.sec-hd{margin-bottom:12px;margin-top:20px}.sec-title{font-size:15px;gap:8px}.sec-title::before{width:4px;height:15px}.sec-link{font-size:13px;padding:6px 12px}
.g2{gap:14px}.panel{padding:18px 19px;border-radius:14px}.panel-hd{margin-bottom:13px;padding-bottom:10px}.panel-title{font-size:15px}
.row{padding:8px 0;font-size:14px}.engr-grid{gap:7px}.engr-item{font-size:14px;padding:8px 11px}
.gem-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:0}.gem-box{padding:11px 12px;min-height:82px;gap:5px}.gem-lv{font-size:18px}.gem-type{font-size:12px}.gem-skill{font-size:14px;line-height:1.3}
.more-grid{gap:9px}.more-btn{padding:13px 15px}.mb-title{font-size:14px}.mb-arr{font-size:13px}
.status{font-size:14px;padding:11px 15px;margin-bottom:14px}
.acc-card{padding:11px 12px;margin-bottom:7px;border-radius:8px}.acc-top{font-size:14px;margin-bottom:6px}.acc-stat{font-size:13px;margin-bottom:4px}.acc-eff{font-size:13px;padding:3px 0}
.brac-eff{padding:8px 0;font-size:14px}.brac-desc{font-size:13px;line-height:1.5;padding:5px 0}
.brac-section-label{font-size:14px;margin-top:12px;margin-bottom:9px}
.brac-list{gap:9px}
.brac-card{padding:12px 14px;border-radius:9px}
.brac-card-desc{font-size:15.5px;line-height:1.65}
.brac-card-desc strong,.brac-card-desc em,.brac-card-desc b{font-weight:900}
.brac-empty{font-size:14px;padding:9px 0}
.brac-effect-card{font-size:15.5px;line-height:1.65;padding:12px 14px;margin-bottom:9px;border-radius:9px}
.ark-core-panel{gap:10px}.ark-core-row{gap:10px}.ark-core-label{font-size:14px;width:44px}.ark-core-box{min-height:72px;padding:9px 7px;border-radius:9px}.ark-core-box .ark-core-pt{font-size:20px}.ark-core-box .ark-core-name{font-size:12px;margin-top:5px}.ark-core-note{font-size:13px;margin-top:10px}
@media(max-width:720px){body{font-size:14px}.result-wrap,.site-grid,.install-wrap{padding-left:16px;padding-right:16px}.char-name{font-size:22px}.panel{padding:16px}.gem-grid{grid-template-columns:repeat(auto-fit,minmax(135px,1fr))}.brac-card-desc{font-size:14.5px;line-height:1.6}.brac-card{padding:11px 12px}}

</style>
</head>
<body>
<div id="homeScreen">
  <div class="hd">
    <div class="logo">M<em>LOA</em></div>
    <form class="sf" onsubmit="return searchFrom(event,'si')">
      <input type="text" id="si" placeholder="캐릭터 이름 입력..." autocomplete="off"/>
      <button type="submit">검색</button>
    </form>
  </div>
  <div class="site-grid">
    <div class="sc" onclick="go('https://lostark.game.onstove.com/Profile/Character/'+enc())"><div class="sc-head"><span class="sc-name">🎮 공식 전투정보실</span><span class="sc-arr">↗</span></div><div class="sc-tags"><span class="stag-g stag">캐릭터 조회</span><span class="stag">장비·각인</span><span class="stag">원정대</span><span class="stag">숙제</span></div></div>
    <div class="sc" onclick="go('https://kloa.gg/characters/'+enc())"><div class="sc-head"><span class="sc-name">🐦 클로아</span><span class="sc-arr">↗</span></div><div class="sc-tags"><span class="stag-g stag">캐릭터 상세</span><span class="stag-b stag">보석</span><span class="stag-b stag">아크그리드</span><span class="stag">시세</span><span class="stag">랭킹</span></div></div>
    <div class="sc" onclick="go('https://loaup.com/character/'+enc())"><div class="sc-head"><span class="sc-name">📊 로아업</span><span class="sc-arr">↗</span></div><div class="sc-tags"><span class="stag-g stag">스펙업 분석</span><span class="stag">시세</span><span class="stag">젬 랭킹</span><span class="stag">숙제</span></div></div>
    <div class="sc" onclick="go('https://lopec.kr/character/specPoint/'+enc())"><div class="sc-head"><span class="sc-name">🏆 로펙</span><span class="sc-arr">↗</span></div><div class="sc-tags"><span class="stag-g stag">환산점수</span><span class="stag">기여도 계산</span><span class="stag">보상 효율</span></div></div>
    <div class="sc" onclick="go('https://lostbuilds.com')"><div class="sc-head"><span class="sc-name">⚔️ 로스트빌드</span><span class="sc-arr">↗</span></div><div class="sc-tags"><span class="stag-g stag">딜 시뮬레이터</span><span class="stag">스킬 분석</span><span class="stag">세팅 비교</span></div></div>
    <div class="sc" onclick="go('https://www.aloa.gg/arkgrid')"><div class="sc-head"><span class="sc-name">🔮 ALOA</span><span class="sc-arr">↗</span></div><div class="sc-tags"><span class="stag-g stag">아크그리드 최적화</span><span class="stag-p stag">화면인식</span><span class="stag">악세 검색</span></div></div>

// HTML/툴팁 텍스트 정리
function decodeHtml(s){
  if(!s)return '';
  var txt=document.createElement('textarea');
  txt.innerHTML=String(s);
  return txt.value;
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}
function stripHtml(s){
  if(!s)return '';
  s=String(s);
  for(var i=0;i<2;i++){
    s=decodeHtml(s);
    s=s.replace(/<br\s*\/?\s*>/gi,'\n')
       .replace(/<\/\s*(div|p|span|font|li|tr|td)\s*>/gi,'\n')
       .replace(/<[^>]*>/g,' ');
  }
  return s.replace(/\r/g,'\n')
          .replace(/[\t ]+/g,' ')
          .replace(/\n\s+/g,'\n')
          .replace(/\s+\n/g,'\n')
          .replace(/\n{2,}/g,'\n')
          .trim();
}
function cleanText(v){return stripHtml(v||'').replace(/^[•\-–·\s]+/,'').replace(/\s+/g,' ').trim();}
function pushUniq(arr,v){
  v=cleanText(v);
  if(v&&arr.indexOf(v)<0)arr.push(v);
}
function collectTooltipStrings(v,out){
  if(v==null)return;
  if(typeof v==='string'){out.push(v);return;}
  if(typeof v==='number'||typeof v==='boolean')return;
  if(Array.isArray(v)){for(var i=0;i<v.length;i++)collectTooltipStrings(v[i],out);return;}
  if(typeof v==='object'){
    var keys=Object.keys(v); // Element_000 순서를 보존해야 팔찌 효과 묶음이 안 깨짐
    for(var j=0;j<keys.length;j++)collectTooltipStrings(v[keys[j]],out);
  }
}
function tooltipToText(tooltip){
  var out=[];
  collectTooltipStrings(tooltip,out);
  return stripHtml(out.join('\n'));
}

// 툴팁 JSON 파싱
function parseTooltip(item){
  if(!item||!item.Tooltip)return null;
  try{return JSON.parse(item.Tooltip);}catch(e){return null;}

// 악세 연마 효과 + 스탯 추출
function extractAccInfo(tooltip){
  var info={stats:[],grinds:[],arkPt:'',raw:''};
  if(!tooltip)return info;
  var text=tooltipToText(tooltip);
  info.raw=text;
  var m;

  var statRe=/(힘|민첩|지능|체력|치명|특화|신속|제압|인내|숙련)\s*\+\s*\d[\d,]*/g;
  while((m=statRe.exec(text))!==null)pushUniq(info.stats,m[0]);

  var ark=[];
  var arkRe=/(깨달음|도약|진화)\s*\+\s*\d+/g;
  while((m=arkRe.exec(text))!==null)pushUniq(ark,m[0]);
  info.arkPt=ark.join(', ');

  var optNames='적에게 주는 피해|추가 피해|낙인력|무기 공격력|공격력|보스 피해|치명타 적중률|치명타 피해|아군 공격력 강화 효과|아군 피해량 강화 효과|아군 강화 효과|아군 회복 효과|파티원 보호막 효과|파티원 회복 효과|전투 중 생명력 회복량|피해 감소|최대 생명력|최대 마나|마나 회복|이동 속도|공격 속도';
  var optRe=new RegExp('(?:\\(?\\s*(상|중|하)\\s*\\)?\\s*)?(?:'+optNames+')\\s*[+\\-]?\\s*\\d[\\d,]*(?:\\.\\d+)?%?','g');
  while((m=optRe.exec(text))!==null)pushUniq(info.grinds,m[0]);

  var lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var line=cleanText(lines[i]);
    if(!line||line.length>130)continue;
    if(/(피해|공격|치명타|낙인|아군|파티원|회복|생명력|마나|속도)/.test(line)&&/(\+\s*\d|\d+(?:\.\d+)?%)/.test(line)){
      if(/증가한다|감소한다|적중 시|이상일 경우/.test(line)&&line.length>45)continue; // 팔찌 긴 설명 섞임 방지
      pushUniq(info.grinds,line);
    }
  }
  return info;
}

// 팔찌 효과 추출: 마침표가 아니라 "초록 아이콘 1개 = 효과 1묶음" 기준으로 묶는다.
function extractBracInfo(tooltip){
  var info={stats:[],effects:[],arkPt:'',raw:''};
  if(!tooltip)return info;
  var text=tooltipToText(tooltip);
  info.raw=text;
  var addedStats=[],addedEffects=[];

  function addStat(v){
    v=cleanText(v);
    if(v&&addedStats.indexOf(v)<0){info.stats.push(v);addedStats.push(v);}
  }
  function addEffect(v){
    v=cleanText(v);
    if(!v)return;
    v=v.replace(/\s+/g,' ');
    if(v.length>480)v=v.substring(0,480)+'…';
    if(v&&addedEffects.indexOf(v)<0){info.effects.push({text:v});addedEffects.push(v);}
  }
  function styleNumbers(s){
    return escapeHtml(cleanText(s)).replace(/(\d[\d,]*(?:\.\d+)?%?)/g,function(v){
      if(v.indexOf('%')>=0)return '<em>'+v+'</em>';
      if(v.length>=4||v.indexOf(',')>=0)return '<strong>'+v+'</strong>';
      return '<b>'+v+'</b>';
    });
  }
  info.styleNumbers=styleNumbers;

  var m;
  var ark=[],arkRe=/(깨달음|도약|진화)\s*\+\s*\d+/g;
  while((m=arkRe.exec(text))!==null)pushUniq(ark,m[0].replace(/\s+/g,''));
  info.arkPt=ark.join(', ');

  function isBreakLine(line){
    return /(효과 부여 불가|아크 패시브 포인트 효과|카제로스 레이드|가디언 토벌|스콜라키아|그 외에 획득처|아이템 티어|거래 제한|거래 불가|캐릭터 귀속|장착중|아이템 레벨|분해 불가|판매 불가|획득처)/.test(line);
  }
  function isNoisyLine(line){
    return !line||/(팔찌 효과|효과 변동하지 않는다|효과는 변동하지 않는다|효과 변동 불가)/.test(line);
  }
  function looksLikeOption(line){
    if(!line||isBreakLine(line)||isNoisyLine(line))return false;
    if(/[\[【].*[\]】]/.test(line))return false;
    if(/^(고대|유물|전설|영웅|희귀)\s*팔찌$/.test(line))return false;
    if(/^찬란한|구원자의 팔찌|도래한|결전의 팔찌/.test(line))return false;
    // 팔찌 옵션은 숫자가 붙거나, 앞 효과의 보충 문장인 경우가 많다.
    return /\d/.test(line)||/(자신의 생명력이|공격이 치명타로|각성기는|적중 시|적용되지 않는다|최대|동안|경우)/.test(line);
  }
  function isContinuationLine(line){
    return /^(자신의 생명력이|공격이 치명타로|공격 적중 시\s*30초|적에게 공격 적중 시|각성기는|단,|최대|해당 효과|이 효과|효과는)/.test(line);
  }
  function shouldJoin(prev,line){
    if(!prev)return false;
    if(isContinuationLine(line))return true;
    if(/^무기 공격력이\s*\d[\d,]*\s*증가/.test(prev)&&/(자신의 생명력이|공격 적중 시\s*(?:5초|30초).*무기 공격력)/.test(line))return true;
    if(/치명타 피해/.test(prev)&&/^공격이 치명타로 적중/.test(line))return true;
    if(/^스킬의 재사용 대기 시간이/.test(prev)&&/^적에게 주는 피해/.test(line))return true;
    return false;
  }

  var lines=text.split('\n').map(cleanText).filter(Boolean);
  var optLines=[];
  var inBracelet=false;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(/팔찌 효과/.test(line)){
      inBracelet=true;
      line=line.replace(/^.*?팔찌 효과\s*/,'').trim();
      if(!line)continue;
    }
    if(!inBracelet)continue;
    if(isBreakLine(line))break;
    if(isNoisyLine(line))continue;
    if(looksLikeOption(line))optLines.push(line);
  }

  // 로스트아크 팔찌 툴팁 기준: 팔찌 효과 영역의 맨 위 2개는 잠금 옵션이다.
  // 그 아래 줄부터가 실제 표시해야 하는 팔찌 효과다. 그래서 단순 전투특성 전체 검색으로 분리하면 안 된다.
  var locked=optLines.slice(0,2);
  for(var s=0;s<locked.length;s++)addStat(locked[s]);

  var effectLines=optLines.slice(2);
  var blocks=[];
  for(var e=0;e<effectLines.length;e++){
    var cur=effectLines[e];
    if(!cur||isBreakLine(cur)||isNoisyLine(cur))continue;
    if(blocks.length&&shouldJoin(blocks[blocks.length-1],cur))blocks[blocks.length-1]=blocks[blocks.length-1]+' '+cur;
    else blocks.push(cur);
  }

  // 줄 구조가 깨진 툴팁 대비: 대표 팔찌 효과 패턴을 통짜로 다시 잡는다.
  var work=cleanText(text).replace(/\s+/g,' ');
  var patternList=[
    /무기 공격력이\s*\d[\d,]*\s*증가한다\.\s*자신의 생명력이\s*\d+(?:\.\d+)?%?\s*이상일 경우 적에게 공격 적중 시\s*\d+초 동안 무기 공격력이\s*\d[\d,]*\s*증가한다\./g,
    /치명타 피해가\s*\d+(?:\.\d+)?%?\s*증가한다\.\s*공격이 치명타로 적중 시\s*적에게 주는 피해가\s*\d+(?:\.\d+)?%?\s*증가한다\./g,
    /스킬의 재사용 대기 시간이\s*\d+(?:\.\d+)?%?\s*증가하지만,?\s*적에게 주는 피해가\s*\d+(?:\.\d+)?%?\s*증가한다\./g,
    /공격 적중 시 매 초마다\s*10초 동안 무기 공격력이\s*\d[\d,]*\s*,\s*공격 및 이동 속도가\s*\d+(?:\.\d+)?%?\s*증가한다\.(?:\s*\([^)]*\))?/g,
    /무기 공격력이\s*\d[\d,]*\s*증가한다\.\s*공격 적중 시\s*30초\s*마다\s*120초 동안 무기 공격력이\s*\d[\d,]*\s*증가한다\.(?:\s*\([^)]*\))?/g,
    /방향성 공격이 아닌 스킬이 적에게 주는 피해가\s*\d+(?:\.\d+)?%?\s*증가한다\.\s*각성기는 적용되지 않는다\./g
  ];
  for(var p=0;p<patternList.length;p++){
    var re=patternList[p];
    while((m=re.exec(work))!==null){
      var hit=cleanText(m[0]);
      if(hit&&blocks.indexOf(hit)<0)blocks.push(hit);
    }
  }

  // 통짜 패턴이 잡혔으면 그 안에 포함되는 짧은 조각은 제거한다.
  // 같은 효과가 "증가한다" 같은 단어 유무 차이로 2번 잡히는 경우가 있어,
  // 정규화 키로 한 번 더 비교하고 더 긴/완전한 문장만 남긴다.
  function effectKey(v){
    return cleanText(v)
      .replace(/증가한다|감소한다/g,'')
      .replace(/[.,·ㆍ\s]/g,'')
      .replace(/[()]/g,'')
      .trim();
  }
  var pruned=[];
  for(var a=0;a<blocks.length;a++){
    var curBlock=cleanText(blocks[a]);
    if(!curBlock)continue;
    var curKey=effectKey(curBlock);
    var contained=false;
    for(var b=0;b<blocks.length;b++){
      if(a===b)continue;
      var otherBlock=cleanText(blocks[b]);
      var otherKey=effectKey(otherBlock);
      if(!otherBlock||!otherKey)continue;
      var otherIsBetter=otherBlock.length>curBlock.length;
      if(otherIsBetter&&(otherBlock.indexOf(curBlock)>=0||otherKey.indexOf(curKey)>=0)){contained=true;break;}
    }
    if(!contained){
      var replaced=false;
      for(var r=0;r<pruned.length;r++){
        var oldKey=effectKey(pruned[r]);
        if(oldKey===curKey||oldKey.indexOf(curKey)>=0||curKey.indexOf(oldKey)>=0){
          if(curBlock.length>pruned[r].length)pruned[r]=curBlock;
          replaced=true;
          break;
        }
      }
      if(!replaced)pruned.push(curBlock);
    }
  }
  for(var q=0;q<pruned.length;q++)addEffect(pruned[q]);

  // 마지막 안전장치: 팔찌 효과 영역 추출 실패 시 기존 방식으로 최소한 옵션명을 잡는다.
  if(!info.effects.length){
    var namedRe=/\[?\s*(공무|무포|습격|정밀|순환|우월|망치|쐐기|열정|냉정|비수|약점 노출|응원|기습|강타|돌진|타격|멸시|무시|반전|긴급수혈|투자|마나회수|마나 순환|속공|회생|오뚝이|분개|수확|앵콜|보상)\s*\]?\s*(상|중|하)?\s*(\d+(?:\.\d+)?%)?/g;
    while((m=namedRe.exec(text))!==null){
      var nm=m[1]+(m[2]?' · '+m[2]:'')+(m[3]?' '+m[3]:'');
      addEffect(nm);
    }
  }
  return info;
}

function findGemArray(src){
  if(!src)return [];
  if(Array.isArray(src)){
    var direct=src.filter(function(x){return x&&typeof x==='object'&&((x.Level!==undefined||x.level!==undefined)&&(x.Name||x.name||x.Tooltip||x.tooltip||x.Icon||x.icon));});
    if(direct.length)return direct;
    for(var i=0;i<src.length;i++){
      var nested=findGemArray(src[i]);
      if(nested.length)return nested;
    }
    return [];
  }
  if(typeof src!=='object')return [];
  var priority=['Gems','gems','Gem','gem','Items','items','Data','data','Result','result'];
  for(var p=0;p<priority.length;p++){
    var k=priority[p];
    if(src[k]){
      var found=findGemArray(src[k]);
      if(found.length)return found;
    }
  }
  for(var key in src){
    if(!Object.prototype.hasOwnProperty.call(src,key))continue;
    if(/skill|effect/i.test(key))continue;
    var got=findGemArray(src[key]);
    if(got.length)return got;
  }
  return [];
}

function deepStringText(v,limit){
  if(limit===undefined)limit=0;
  if(v===null||v===undefined||limit>5)return '';
  if(typeof v==='string')return stripHtml(v);
  if(typeof v==='number'||typeof v==='boolean')return String(v);
  var out=[];
  if(Array.isArray(v)){
    for(var i=0;i<v.length;i++)out.push(deepStringText(v[i],limit+1));
    return out.join(' ');
  }
  if(typeof v==='object'){
    for(var k in v){
      if(Object.prototype.hasOwnProperty.call(v,k))out.push(k+' '+deepStringText(v[k],limit+1));
    }
  }
  return out.join(' ');
}

function compactGemText(v){
  if(v===null||v===undefined)return '';
  if(typeof v==='string')return cleanText(v);
  if(typeof v==='number'||typeof v==='boolean')return String(v);
  if(Array.isArray(v))return v.map(compactGemText).join(' ');
  if(typeof v==='object'){
    var out=[];
    var preferred=['Name','name','Type','type','Grade','grade','Description','description','Tooltip','tooltip','Effect','effect','Option','option','Value','value','Text','text'];
    for(var i=0;i<preferred.length;i++){
      var k=preferred[i];
      if(v[k]!==undefined&&v[k]!==null)out.push(compactGemText(v[k]));
    }
    return out.join(' ');
  }
  return '';
}
function gemTextScoreType(text){
  text=cleanText(text);
  if(!text)return '';
  var explicit=text.match(/겁화|작열|멸화|홍염|원화/);
  if(explicit)return explicit[0];

  // T4 광휘 보석은 보석 이름만으로는 타입이 안 나오는 경우가 있어 효과 문장으로 판별한다.
  // 피해/데미지 증가 계열 = 겁화, 재사용 대기시간/쿨타임 감소 계열 = 작열.
  var dmgPatterns=[
    /(?:피해량|피해|데미지)\s*(?:이|가|를|을)?\s*(?:<[^>]+>\s*)?[+\-]?\d+(?:\.\d+)?%?\s*(?:증가|상승)/i,
    /(?:적에게\s*주는\s*피해|주는\s*피해)\s*(?:이|가)?\s*(?:<[^>]+>\s*)?[+\-]?\d+(?:\.\d+)?%?\s*(?:증가|상승)/i,
    /(?:damage|dmg)\s*(?:increase|increased|up)/i
  ];
  var cdPatterns=[
    /(?:재사용\s*대기시간|쿨타임|대기시간)\s*(?:이|가|을|를)?\s*(?:<[^>]+>\s*)?[+\-]?\d+(?:\.\d+)?%?\s*(?:감소|줄어|감축)/i,
    /(?:cooldown|cool\s*time|cd)\s*(?:reduction|reduced|decrease|down)/i
  ];
  var dmgIdx=-1,cdIdx=-1;
  for(var i=0;i<dmgPatterns.length;i++){
    var dm=text.match(dmgPatterns[i]);
    if(dm){dmgIdx=dm.index;break;}
  }
  for(var j=0;j<cdPatterns.length;j++){
    var cm=text.match(cdPatterns[j]);
    if(cm){cdIdx=cm.index;break;}
  }
  if(dmgIdx>=0&&cdIdx<0)return '겁화';
  if(cdIdx>=0&&dmgIdx<0)return '작열';
  if(dmgIdx>=0&&cdIdx>=0)return dmgIdx<cdIdx?'겁화':'작열';

  // 느슨한 보조 판별. 위 정규식이 안 맞는 응답 구조용.
  var hasDmg=/(피해량|피해|데미지|damage|dmg)/i.test(text)&&/(증가|상승|increase|increased|up)/i.test(text);
  var hasCd=/(재사용\s*대기시간|쿨타임|대기시간|cooldown|cool\s*time|cd)/i.test(text)&&/(감소|줄어|감축|reduction|reduced|decrease|down)/i.test(text);
  if(hasDmg&&!hasCd)return '겁화';
  if(hasCd&&!hasDmg)return '작열';
  if(hasDmg&&hasCd){
    var di=text.search(/피해량|피해|데미지|damage|dmg/i);
    var ci=text.search(/재사용\s*대기시간|쿨타임|대기시간|cooldown|cool\s*time|cd/i);
    return di>=0&&ci>=0&&di<ci?'겁화':'작열';
  }
  return '';
}
function gemTypeFromAny(gem,effect){
  // 1순위: 보석 본체/툴팁에 명시된 타입
  var gemChunks=[];
  if(gem){
    gemChunks.push(gem.Name||gem.name||'');
    gemChunks.push(gem.Type||gem.type||'');
    gemChunks.push(gem.Grade||gem.grade||'');
    gemChunks.push(gem.Icon||gem.icon||'');
    var gt=parseTooltip(gem);
    if(gt)gemChunks.push(tooltipToText(gt));
  }
  var fromGem=gemTextScoreType(gemChunks.join(' '));
  if(fromGem)return fromGem;

  // 2순위: /gems Effects에 연결된 현재 보석의 효과 문장
  var effectChunks=[];
  if(effect){
    effectChunks.push(effect.Name||effect.name||'');
    effectChunks.push(effect.Type||effect.type||'');
    effectChunks.push(effect.Effect||effect.effect||'');
    effectChunks.push(effect.Option||effect.option||'');
    effectChunks.push(effect.Description||effect.description||'');
    effectChunks.push(effect.Tooltip||effect.tooltip||'');
    effectChunks.push(compactGemText(effect));
  }
  var fromEffect=gemTextScoreType(effectChunks.join(' '));
  if(fromEffect)return fromEffect;

  // 3순위: 아이콘 URL에 타입 힌트가 들어오는 경우
  var icon=cleanText((gem&&(gem.Icon||gem.icon))||'');
  if(/겁화|멸화|damage|dmg|attack|atk/i.test(icon))return '겁화';
  if(/작열|홍염|cool|cooldown|cd|reuse/i.test(icon))return '작열';

  if(/광휘/.test(cleanText(gemChunks.join(' '))))return '광휘';
  return '보석';
}
function isLostArkClassName(s){

  var classes=['버서커','디스트로이어','워로드','홀리나이트','슬레이어','브레이커','배틀마스터','인파이터','기공사','창술사','스트라이커','데빌헌터','블래스터','호크아이','스카우터','건슬링어','바드','서머너','아르카나','소서리스','데모닉','블레이드','리퍼','소울이터','도화가','기상술사','환수사'];
  return classes.indexOf(s)>=0;
}
function sanitizeGemSkillName(v){
  var s=cleanText(v);
  if(!s)return '';
  s=s.replace(/[\[【][^\]】]*[\]】]/g,' ').replace(/\s+/g,' ').trim();
  s=s.replace(/^(장착 시|사용 시|적용 시)\s*/,'');
  // "소울이터 길로틴 스윙"처럼 클래스명이 앞에 붙는 경우 제거
  var parts=s.split(/\s+/);
  if(parts.length>1&&isLostArkClassName(parts[0]))s=parts.slice(1).join(' ');
  s=s.replace(/\s*스킬(?:의)?\s.*$/,'');
  s=s.replace(/\s*(?:피해량|피해|재사용 대기시간|쿨타임|대기시간)\s.*$/,'');
  s=s.replace(/\s*(?:증가|감소).*$/,'').trim();
  var banned=/^(아이템|보석|스킬|효과|장착|거래|캐릭터|귀속|티어|레벨|사용|분해|획득|판매|착용|제련|등급|재료|원정대|보유|장착중|장착 중|보석 효과|기본 효과|추가 효과|광휘의 보석|광휘|겁화|작열|멸화|홍염|원화|소울이터 전용)$/;
  if(!s||banned.test(s)||isLostArkClassName(s))return '';
  if(/(\+|%|Lv\.?|레벨|티어|아이템|전용|보석|효과)/i.test(s))return '';
  if(s.length<2||s.length>30)return '';
  return s;
}
function directGemSkill(obj){

function findGemEffects(src){
  if(!src)return [];
  var direct=src.Effects||src.effects||src.Effect||src.effect||src.GemEffects||src.gemEffects;
  if(Array.isArray(direct))return direct;
  var found=[];
  function walk(v){
    if(!v||found.length)return;
    if(Array.isArray(v)){
      var cand=v.filter(function(x){return x&&typeof x==='object'&&(x.GemSlot!==undefined||x.gemSlot!==undefined||x.SkillName||x.skillName||x.TargetSkillName||x.targetSkillName||x.Description||x.description);});
      if(cand.length){found=cand;return;}
      for(var i=0;i<v.length;i++)walk(v[i]);
      return;
    }
    if(typeof v==='object'){
      for(var k in v){if(Object.prototype.hasOwnProperty.call(v,k))walk(v[k]);}
    }
  }
  walk(src);
  return found;
}
function effectByGem(effects,gem,idx){
  if(!effects||!effects.length)return null;
  var slot=getGemSlot(gem);
  if(slot!==null){
    var sn=parseInt(String(slot),10);
    for(var i=0;i<effects.length;i++){
      var es=getGemSlot(effects[i]);
      if(es===null)continue;
      if(String(es)===String(slot))return effects[i];
      var en=parseInt(String(es),10);
      // API 응답에 따라 gem Slot은 0부터, GemSlot은 1부터 내려오는 경우를 방어
      if(!isNaN(sn)&&!isNaN(en)&&(en===sn+1||en+1===sn))return effects[i];
    }
  }
  // Slot 키가 없거나 매칭 실패 시 원본 배열 순서 기준으로 대응
  return effects[idx]||null;
}
function skillFromGemDescription(text){
  text=cleanText(text);
  if(!text)return '';
  var patterns=[
    /([가-힣A-Za-z0-9·\s]{2,30})\s*스킬(?:의)?\s*(?:피해량|피해|재사용 대기시간|쿨타임|대기시간)/,
    /([가-힣A-Za-z0-9·\s]{2,30})\s*(?:피해량|피해|재사용 대기시간|쿨타임)\s*(?:이|가)?\s*(?:\d|<|증가|감소)/,
    /(?:대상 스킬|적용 스킬)\s*[:：]\s*([가-힣A-Za-z0-9·\s]{2,30})/
  ];
  for(var i=0;i<patterns.length;i++){
    var m=text.match(patterns[i]);
    if(m){
      var s=sanitizeGemSkillName(m[1]);
      if(s)return s;
    }
  }
  var bracket=/[\[【]\s*([^\]】]{2,30})\s*[\]】]/g,b;
  while((b=bracket.exec(text))!==null){
    var c=sanitizeGemSkillName(b[1]);
    if(c)return c;
  }
  return '';
}
function extractGemSkillName(gem,effect){
  // 공식 /gems 응답의 Effects 쪽에 스킬명이 들어오는 경우가 많아서 이쪽을 최우선으로 사용
  var fromEffect=directGemSkill(effect);
  if(fromEffect)return fromEffect;
  if(effect){
    var desc=effect.Description||effect.description||effect.Tooltip||effect.tooltip||'';
    var fromDesc=skillFromGemDescription(desc);
    if(fromDesc)return fromDesc;
  }
  var direct=directGemSkill(gem);
  if(direct)return direct;
  var tooltip=parseTooltip(gem);
  var text=tooltip?tooltipToText(tooltip):'';
  var fromTooltip=skillFromGemDescription(text);
  if(fromTooltip)return fromTooltip;
  return '스킬명 확인 필요';
}
function buildGems(gems,gemSource){
  if(!gems.length)return '<div class="panel"><div class="row"><span class="rl">보석 데이터 없음</span></div></div>';
  var effects=findGemEffects(gemSource);
  var pairs=gems.map(function(g,idx){return{gem:g,effect:effectByGem(effects,g,idx),idx:idx};});
  pairs.sort(function(a,b){return(b.gem.Level||0)-(a.gem.Level||0);});
  var list=pairs.slice(0,11);
  var grid='<div class="gem-grid">';
  for(var i=0;i<list.length;i++){
    var gem=list[i].gem,lv=gem.Level||0,tp=gemTypeFromAny(gem,list[i].effect),skill=extractGemSkillName(gem,list[i].effect);
    var cls=lv>=10?'lv10':lv>=9?'lv9':lv>=8?'lv8':'';
    grid+='<div class="gem-box '+cls+'" title="'+escapeHtml((lv?lv+'레벨 ':'')+tp+' - '+skill)+'">';
    grid+='<div class="gem-top"><span class="gem-lv">'+escapeHtml(lv)+'레벨</span><span class="gem-type">'+escapeHtml(tp)+'</span></div>';
    grid+='<div class="gem-skill">'+escapeHtml(skill)+'</div></div>';
  }
  grid+='</div>';
  return '<div class="panel">'+grid+'</div>';
}

function arkGradeClass(grade){
  grade=String(grade||'').toLowerCase();
  if(/고대|ancient/.test(grade))return 'ancient';
  if(/유물|relic/.test(grade))return 'relic';
  if(/전설|legendary/.test(grade))return 'legendary';
  return 'unknown';
}
function arkGradeText(cls){
  if(cls==='ancient')return '고대';
  if(cls==='relic')return '유물';
  if(cls==='legendary')return '전설';
  return '';
}
function coreKindFromText(text){
  text=String(text||'');
  if(/해\s*코어|sun/i.test(text))return '해';
  if(/달\s*코어|moon/i.test(text))return '달';
  if(/별\s*코어|star/i.test(text))return '별';
  return '';
}
function coreRowFromText(text){
  text=String(text||'');
  if(/질서|order/i.test(text))return '질서';
  if(/혼돈|chaos/i.test(text))return '혼돈';
  return '';
}
function gradeFromText(text){
  text=String(text||'');
  var m=text.match(/고대|유물|전설|ancient|relic|legendary/i);
  return m?m[0]:'';
}
function pointFromObject(obj){
  if(!obj||typeof obj!=='object')return null;
  var keys=['Point','Points','point','points','Value','value','Score','score','Level','level','TotalPoint','totalPoint','ActivePoint','activePoint','ActivatePoint','activatePoint','ActivationPoint','activationPoint','활성화포인트','포인트'];
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    if(obj[k]!==undefined&&obj[k]!==null&&obj[k]!==''&&!isNaN(Number(String(obj[k]).replace(/,/g,'')))){
      var n=parseInt(String(obj[k]).replace(/,/g,''),10);
      if(n>=0&&n<=99)return n;
    }
  }
  for(var prop in obj){
    if(!Object.prototype.hasOwnProperty.call(obj,prop))continue;
    if(/point|score|value|level|포인트|점수/i.test(prop)&&!isNaN(Number(String(obj[prop]).replace(/,/g,'')))){
      var v=parseInt(String(obj[prop]).replace(/,/g,''),10);
      if(v>=0&&v<=99)return v;
    }
  }
  return null;
}
function pointNearCoreText(text,kind){
  text=String(text||'').replace(/\\n/g,' ').replace(/\s+/g,' ');
  var k=kind==='해'?'해':kind==='달'?'달':'별';
  var res=null,m;
  var re1=new RegExp(k+'\\s*코어[^0-9]{0,60}(\\d{1,2})\\s*(?:pt|포인트)?','g');
  while((m=re1.exec(text))!==null){res=parseInt(m[1],10);break;}
  if(res!==null)return res;
  var re2=new RegExp('(\\d{1,2})\\s*(?:pt|포인트)[^가-힣A-Za-z0-9]{0,40}'+k+'\\s*코어','g');
  while((m=re2.exec(text))!==null){res=parseInt(m[1],10);break;}
  return res;
}
function normalizeArkGridData(raw){
  var out={rows:{'질서':{'해':null,'달':null,'별':null},'혼돈':{'해':null,'달':null,'별':null}},has:false,raw:raw};
  function setCore(row,kind,point,grade,source){
    if(!row||!kind)return;
    if(point===null||point===undefined||point==='')point=0;
    point=parseInt(String(point).replace(/,/g,''),10);
    if(isNaN(point))point=0;
    var cls=arkGradeClass(grade);
    var cur=out.rows[row][kind];
    var item={row:row,kind:kind,point:point,grade:grade||arkGradeText(cls),cls:cls,source:source||''};
    // 이미 값이 있으면 등급/포인트가 더 확실한 쪽을 우선한다.
    if(!cur||(cur.cls==='unknown'&&cls!=='unknown')||(cur.point===0&&point>0))out.rows[row][kind]=item;
    out.has=true;
  }
  function nodeText(node){
    try{return JSON.stringify(node);}catch(e){return String(node||'');}
  }
  function directStringBag(obj){
    var arr=[];
    if(!obj||typeof obj!=='object')return '';
    for(var k in obj){
      if(!Object.prototype.hasOwnProperty.call(obj,k))continue;
      var v=obj[k];
      if(typeof v==='string'||typeof v==='number')arr.push(k+' '+v);
    }
    return arr.join(' ');
  }
  function visit(node,ctx,depth){
    if(depth>8||node===null||node===undefined)return;
    if(Array.isArray(node)){
      for(var i=0;i<node.length;i++)visit(node[i],ctx,depth+1);
      return;
    }
    if(typeof node!=='object')return;
    var bag=directStringBag(node);
    var txt=bag+' '+ctx;
    var row=coreRowFromText(txt)||coreRowFromText(nodeText(node));
    var kind=coreKindFromText(txt)||coreKindFromText(nodeText(node));
    var grade=gradeFromText(txt)||gradeFromText(nodeText(node));
    var point=pointFromObject(node);
    if(row&&kind){
      if(point===null)point=pointNearCoreText(nodeText(node),kind);
      if(point!==null)setCore(row,kind,point,grade,'object');
    }
    for(var key in node){
      if(!Object.prototype.hasOwnProperty.call(node,key))continue;
      var v=node[key];
      var nextCtx=(ctx+' '+key+' '+(typeof v==='string'||typeof v==='number'?v:'')).trim();
      visit(v,nextCtx,depth+1);
    }
  }
  visit(raw,'',0);

  // 마지막 보정: JSON 문자열에서 행 구간별로 해/달/별 코어를 직접 찾는다.
  var full=nodeText(raw).replace(/\\n/g,' ').replace(/\s+/g,' ');
  var rows=['질서','혼돈'];
  var kinds=['해','달','별'];
  for(var r=0;r<rows.length;r++){
    var row=rows[r];
    var start=full.indexOf(row);
    if(start<0)continue;
    var end=full.length;
    for(var rr=0;rr<rows.length;rr++){
      if(rows[rr]===row)continue;
      var other=full.indexOf(rows[rr],start+1);
      if(other>=0&&other<end)end=other;
    }
    var seg=full.substring(start,end);
    for(var k=0;k<kinds.length;k++){
      var kind=kinds[k];
      var pt=pointNearCoreText(seg,kind);
      if(pt!==null){
        var around='';
        var idx=seg.indexOf(kind+' 코어');
        if(idx<0)idx=seg.indexOf(kind+'코어');
        if(idx>=0)around=seg.substring(Math.max(0,idx-80),Math.min(seg.length,idx+120));
        setCore(row,kind,pt,gradeFromText(around)||gradeFromText(seg),'text');
      }
    }
  }
  return out;
}
function buildArk(arkGrid,E){
  var parsed=normalizeArkGridData(arkGrid);
  var h='<div class="panel"><div class="panel-hd"><span class="panel-title">아크그리드 코어</span><a class="sec-link" href="https://aloa.gg/ko/arkgrid" target="_blank">ALOA 최적화 ↗</a></div>';
  if(!arkGrid){
    h+='<div class="ark-core-note">아크그리드 데이터를 불러오지 못했어요. 캐릭터가 아크그리드를 열지 않았거나 API 응답이 없을 수 있어요.</div>';
    h+='<div style="display:flex;flex-direction:column;gap:4px;margin-top:8px"><a class="more-btn" href="https://kloa.gg/characters/'+E+'" target="_blank" style="padding:8px 10px"><span class="mb-title">클로아에서 확인</span><span class="mb-arr">↗</span></a></div></div>';
    return h;
  }
  if(!parsed.has){
    h+='<div class="ark-core-note">아크그리드 API는 호출됐지만 질서/혼돈 코어 구조를 자동 인식하지 못했어요. 브라우저 콘솔의 <strong>아크그리드 응답</strong> 구조를 확인하면 바로 맞춰줄 수 있어요.</div>';
    h+='<div style="display:flex;flex-direction:column;gap:4px;margin-top:8px"><a class="more-btn" href="https://kloa.gg/characters/'+E+'" target="_blank" style="padding:8px 10px"><span class="mb-title">클로아에서 확인</span><span class="mb-arr">↗</span></a></div></div>';
    return h;
  }
  function box(row,kind){
    var c=parsed.rows[row][kind]||{point:'-',cls:'unknown',grade:''};
    var title=kind+' 코어';
    var grade=c.grade?escapeHtml(c.grade)+' · ':'';
    var pt=(c.point!==undefined&&c.point!==null&&c.point!=='')?c.point:'-';
    return '<div class="ark-core-box '+c.cls+'" title="'+escapeHtml(row+' '+grade+title)+'"><div class="ark-core-pt">'+escapeHtml(String(pt))+'pt</div><div class="ark-core-name">'+grade+escapeHtml(title)+'</div></div>';
  }
  h+='<div class="ark-core-wrap">';
  h+='<div class="ark-core-row"><div class="ark-core-label">질서</div>'+box('질서','해')+box('질서','달')+box('질서','별')+'</div>';
  h+='<div class="ark-core-row"><div class="ark-core-label">혼돈</div>'+box('혼돈','해')+box('혼돈','달')+box('혼돈','별')+'</div>';
  h+='</div></div>';
  return h;
}

function buildStats(p,E){
  var stats=p.Stats||[];
  var order=['치명','특화','신속','제압','인내','숙련'];
  var rows='';
  if(stats.length){
    for(var i=0;i<order.length;i++){
      var nm=order[i],s=null;
      for(var j=0;j<stats.length;j++){if(stats[j].Type===nm){s=stats[j];break;}}
      var val=s?s.Value:'0';
      var isTop=parseInt(String(val).replace(/,/g,''))>1000;
      rows+='<div class="row"><span class="rl">'+nm+'</span><span class="'+(isTop?'rv-g':'rv')+'">'+val+'</span></div>';
    }
  }else{rows='<div class="row"><span class="rl">전투특성 데이터 없음</span></div>';}
  return '<div class="panel"><div class="panel-hd"><span class="panel-title">전투특성</span><a class="sec-link" href="https://kloa.gg/crow/'+encodeURIComponent(curChar)+'" target="_blank">전투력 계산기 ↗</a></div>'+rows+'</div>';
}
